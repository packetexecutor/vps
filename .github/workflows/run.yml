
name: Windows RDP + Tailscale (6h)
on:
  workflow_dispatch:
jobs:
  rdp:
    runs-on: windows-latest
    timeout-minutes: 395
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Admin + Enable RDP
        shell: pwsh
        run: |
          $pass = "Vps@wWAcxXuS@8"
          $sec  = ConvertTo-SecureString $pass -AsPlainText -Force
          if (!(Get-LocalUser -Name runneradmin -ErrorAction SilentlyContinue)) {
            New-LocalUser runneradmin -Password $sec -FullName "Admin"
          } else {
            Set-LocalUser runneradmin -Password $sec
          }
          Add-LocalGroupMember -Group "Administrators" -Member runneradmin -ErrorAction SilentlyContinue
          
          Set-ItemProperty 'HKLM:SystemCurrentControlSetControlTerminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty 'HKLM:SystemCurrentControlSetControlTerminal ServerWinStationsRDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop" -ErrorAction SilentlyContinue
          Write-Host "RDP enabled"

      - name: Install Tailscale
        shell: pwsh
        run: |
          iwr https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi -OutFile ts.msi -UseBasicParsing -TimeoutSec 60
          Start-Process msiexec -ArgumentList '/i','ts.msi','/quiet','/norestart' -Wait
          Start-Sleep 15
          Write-Host "Tailscale installed"

      - name: Connect Tailscale and Find Auth URL
        id: tailscale_connect
        shell: pwsh
        run: |
          $ts = "$env:ProgramFiles/Tailscale/tailscale.exe"
          $name = "gh-rdp-$(Get-Random -Maximum 99999)"
          
          # Check if already connected
          $ip = & $ts ip -4 2>$null
          if ($ip -match '^100.') {
            Write-Host "Already connected: $($ip.Trim())"
            "$($ip.Trim()):3389|Vps@wWAcxXuS@8" | Out-File info.txt -Encoding utf8 -NoNewline
            "connected" | Out-File status.txt -Encoding utf8 -NoNewline
            exit 0
          }
          
          # Start tailscale up (this will show auth URL)
          Write-Host "Starting Tailscale with hostname: $name"
          & $ts up --hostname=$name --accept-routes --accept-dns=false 2>&1 | Out-Null
          
          # Wait and check for auth URL or connection
          $authUrl = ""
          for ($i = 0; $i -lt 60; $i++) {
            Start-Sleep 2
            
            # Check if connected
            $ip = & $ts ip -4 2>$null
            if ($ip -match '^100.') {
              Write-Host "Connected! IP: $($ip.Trim())"
              "$($ip.Trim()):3389|Vps@wWAcxXuS@8" | Out-File info.txt -Encoding utf8 -NoNewline
              "connected" | Out-File status.txt -Encoding utf8 -NoNewline
              exit 0
            }
            
            # Check for auth URL in status
            $status = & $ts status 2>&1 | Out-String
            if ($status -match 'https://login.tailscale.com/a/[a-zA-Z0-9]+') {
              $authUrl = $Matches[0]
              Write-Host "========================================"
              Write-Host "AUTH URL FOUND: $authUrl"
              Write-Host "========================================"
              "WAITING_AUTH|$authUrl" | Out-File info.txt -Encoding utf8 -NoNewline
              "waiting_auth" | Out-File status.txt -Encoding utf8 -NoNewline
              $authUrl | Out-File authurl.txt -Encoding utf8 -NoNewline
              break
            }
          }
          
          if (-not $authUrl) {
            Write-Host "No auth URL found, still pending..."
            "PENDING|Tailscale dang khoi dong..." | Out-File info.txt -Encoding utf8 -NoNewline
            "pending" | Out-File status.txt -Encoding utf8 -NoNewline
          }

      - name: Upload Auth URL (Immediate)
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: info.txt
          overwrite: true

      - name: Wait for Approval and Keep Auth URL Available
        shell: pwsh
        run: |
          $ts = "$env:ProgramFiles/Tailscale/tailscale.exe"
          
          Write-Host "Waiting for Tailscale approval (up to 10 minutes)..."
          Write-Host "Auth URL will be re-uploaded every 30 seconds for web client"
          
          $lastUpload = Get-Date
          $authUrl = ""
          
          # Try to read saved auth URL
          if (Test-Path authurl.txt) {
            $authUrl = (Get-Content authurl.txt -Raw).Trim()
            Write-Host "Loaded auth URL: $authUrl"
          }
          
          for ($i = 0; $i -lt 120; $i++) {
            # Check if connected
            $ip = & $ts ip -4 2>$null
            if ($ip -match '^100.') {
              Write-Host "========================================"
              Write-Host "APPROVED! Final IP: $($ip.Trim())"
              Write-Host "========================================"
              "$($ip.Trim()):3389|Vps@wWAcxXuS@8" | Out-File info.txt -Encoding utf8 -NoNewline
              exit 0
            }
            
            # If no auth URL yet, try to find it
            if (-not $authUrl) {
              $status = & $ts status 2>&1 | Out-String
              if ($status -match 'https://login.tailscale.com/a/[a-zA-Z0-9]+') {
                $authUrl = $Matches[0]
                Write-Host "Found auth URL: $authUrl"
                $authUrl | Out-File authurl.txt -Encoding utf8 -NoNewline
              }
            }
            
            # Re-write info.txt with auth URL every iteration to keep it fresh
            if ($authUrl) {
              "WAITING_AUTH|$authUrl" | Out-File info.txt -Encoding utf8 -NoNewline
            } else {
              "PENDING|Dang cho Tailscale..." | Out-File info.txt -Encoding utf8 -NoNewline
            }
            
            Start-Sleep 5
          }
          
          Write-Host "Timeout waiting for approval"
          "TIMEOUT|Chua approve sau 10 phut" | Out-File info.txt -Encoding utf8 -NoNewline

      - name: Upload Final Status
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: result
          path: info.txt
          overwrite: true

      - name: Keep Alive 6 Hours
        if: always()
        shell: pwsh
        run: |
          $ts = "$env:ProgramFiles/Tailscale/tailscale.exe"
          
          Write-Host "========================================"
          Write-Host "RDP Tailscale - Keep Alive 6 Hours"
          Write-Host "User: runneradmin"
          Write-Host "Pass: Vps@wWAcxXuS@8"
          Write-Host "========================================"
          
          # Check and report IP every 30 minutes
          for ($m = 1; $m -le 360; $m++) {
            if ($m % 30 -eq 0) {
              $ip = & $ts ip -4 2>$null
              if ($ip) {
                Write-Host "[$m/360] Alive - IP: $($ip.Trim())"
                # Update info.txt with current IP
                "$($ip.Trim()):3389|Vps@wWAcxXuS@8" | Out-File info.txt -Encoding utf8 -NoNewline
              } else {
                Write-Host "[$m/360] Alive - Tailscale not connected"
              }
            }
            Start-Sleep 60
          }
          
          Write-Host "Session ended after 6 hours"
